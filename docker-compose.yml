services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sweeps
      POSTGRES_PASSWORD: sweeps
      POSTGRES_DB: sweeps
    # Contabo shared VPS: ICS already owns 127.0.0.1:5432. Backend uses db:5432
    # on the Compose network. Uncomment for dedicated VPS / local uvicorn→Docker DB.
    # On Contabo beside ICS, use 5433 if you need a host port:
    #   - "127.0.0.1:5433:5432"
    # ports:
    #   - "127.0.0.1:5432:5432"  # local uvicorn uses localhost:5432; in-compose backend uses db:5432
    volumes:
      - sweeps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweeps"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sweeps_net

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"  # localhost only; host nginx proxies api-jobs.tritechhelp.com → here
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sweeps:sweeps@db:5432/sweeps
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sweeps_net

volumes:
  sweeps_pg_data:

networks:
  sweeps_net:
    driver: bridge
