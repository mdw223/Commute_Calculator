services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sweeps
      POSTGRES_PASSWORD: sweeps
      POSTGRES_DB: sweeps
    ports:
      - "5432:5432"
    volumes:
      - sweeps_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweeps"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sweeps:sweeps@db:5432/sweeps
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  sweeps_pg_data:
